<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Co Jemy?">
    <title>Co Jemy? Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
        .dish-card { background: #1e293b; border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        .dish-image { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .dish-info { padding: 10px; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%); position: absolute; bottom: 0; width: 100%; }
        #loading { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 200; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

    <script>
        const CONFIG = {
            apiKey: 'patgjxDFQDP1rOaHk.468e4b18caba31a6c408c40e553d1e6eaa2e174ec071f8110f90bad1681199b9', 
            baseId: 'app5v5h03V9wMF6Xh',
            tableName: 'Table 1' // Upewnij się, że to nazwa Twojej tabeli (u góry w Airtable)
        };
    </script>

    <div id="loading">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-orange-500 mb-4"></div>
        <p id="loadingText" class="font-bold text-orange-500">Synchronizacja z chmurą...</p>
    </div>

    <header class="p-6 pb-4 flex justify-between items-end bg-slate-900 sticky top-0 z-50 border-b border-slate-800">
        <div>
            <h1 class="text-3xl font-black text-orange-500 tracking-tighter">CO JEMY?</h1>
            <p id="stats" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Łączenie...</p>
        </div>
        <button onclick="document.getElementById('fileInput').click()" class="bg-orange-600 w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-transform">
            <span class="text-4xl font-light text-white">+</span>
        </button>
    </header>

    <input type="file" id="fileInput" accept="image/*" capture="environment" class="hidden" onchange="addNewDish(event)">

    <div id="grid" class="grid-container"></div>

    <div id="modal" class="fixed inset-0 bg-black/95 z-[100] hidden p-6 flex flex-col justify-center items-center" onclick="this.classList.add('hidden')">
        <img id="modalImg" class="w-full rounded-3xl shadow-2xl mb-6">
        <h2 id="modalTitle" class="text-3xl font-bold text-white mb-2"></h2>
        <p id="modalDesc" class="text-slate-400 italic text-center text-lg"></p>
        <button id="delBtn" class="mt-12 text-red-500 font-bold py-3 px-8 rounded-full border border-red-500/20">USUŃ NA ZAWSZE</button>
    </div>

    <script>
        async function fetchDishes() {
            document.getElementById('stats').innerText = "Pobieranie...";
            try {
                const response = await fetch(`https://api.airtable.com/v0/${CONFIG.baseId}/${encodeURIComponent(CONFIG.tableName)}`, {
                    headers: { Authorization: `Bearer ${CONFIG.apiKey}` }
                });
                const data = await response.json();
                if (data.records) {
                    render(data.records);
                } else {
                    alert("Błąd: Sprawdź Base ID i Token!");
                }
            } catch (e) {
                console.error(e);
                alert("Błąd połączenia z Airtable");
            }
        }

        function render(records) {
            const grid = document.getElementById('grid');
            const stats = document.getElementById('stats');
            grid.innerHTML = '';
            stats.innerText = `Masz ${records.length} dań w chmurze`;

            records.forEach(record => {
                const f = record.fields;
                if (!f.Photo) return; // Pomiń jeśli nie ma zdjęcia

                const card = document.createElement('div');
                card.className = 'dish-card active:scale-95 transition-transform';
                card.innerHTML = `
                    <img src="${f.Photo}" class="dish-image" loading="lazy">
                    <div class="dish-info">
                        <div class="text-xs font-bold truncate pr-2">${f.Name || 'Bez nazwy'}</div>
                    </div>
                `;
                card.onclick = () => {
                    document.getElementById('modalImg').src = f.Photo;
                    document.getElementById('modalTitle').innerText = f.Name || '';
                    document.getElementById('modalDesc').innerText = f.Description || '';
                    document.getElementById('delBtn').onclick = (e) => {
                        e.stopPropagation();
                        deleteDish(record.id);
                    };
                    document.getElementById('modal').classList.remove('hidden');
                };
                grid.appendChild(card);
            });
        }

        async function addNewDish(event) {
            const file = event.target.files[0];
            if (!file) return;

            const name = prompt("Jak nazywa się to danie?");
            if (!name) return;
            const desc = prompt("Dodatkowy opis (opcjonalnie):") || "";

            const loading = document.getElementById('loading');
            const loadingText = document.getElementById('loadingText');
            loading.style.display = 'flex';
            loadingText.innerText = "Kompresja zdjęcia...";

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const max = 800; 
                    let w = img.width, h = img.height;
                    if (w > h) { if(w > max){ h *= max/w; w = max; } }
                    else { if(h > max){ w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    
                    const base64 = canvas.toDataURL('image/jpeg', 0.6);
                    
                    loadingText.innerText = "Wysyłanie do chmury...";

                    try {
                        const res = await fetch(`https://api.airtable.com/v0/${CONFIG.baseId}/${encodeURIComponent(CONFIG.tableName)}`, {
                            method: 'POST',
                            headers: {
                                Authorization: `Bearer ${CONFIG.apiKey}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                fields: {
                                    Name: name,
                                    Description: desc,
                                    Photo: base64
                                }
                            })
                        });
                        
                        if (res.ok) {
                            fetchDishes();
                        } else {
                            const err = await res.json();
                            alert("Błąd Airtable: " + JSON.stringify(err.error));
                        }
                    } catch (err) {
                        alert("Błąd podczas wysyłania");
                    } finally {
                        loading.style.display = 'none';
                        event.target.value = '';
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function deleteDish(id) {
            if (!confirm("Usunąć to danie z chmury na zawsze?")) return;
            
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loadingText').innerText = "Usuwanie...";

            try {
                await fetch(`https://api.airtable.com/v0/${CONFIG.baseId}/${encodeURIComponent(CONFIG.tableName)}/${id}`, {
                    method: 'DELETE',
                    headers: { Authorization: `Bearer ${CONFIG.apiKey}` }
                });
                document.getElementById('modal').classList.add('hidden');
                fetchDishes();
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // Start
        fetchDishes();
    </script>
</body>
</html>
