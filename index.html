<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Co Jemy? V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; font-family: sans-serif; overflow-x: hidden; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
        .dish-card { background: #1e293b; border-radius: 20px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .dish-image { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .input-field { background: #0f172a; border: 2px solid #334155; border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; transition: border-color 0.2s; }
        .input-error { border-color: #ef4444 !important; }
        #loading { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 200; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .custom-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 150; display: none; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <script>
        const CONFIG = {
            apiKey: 'patgjxDFQDP1rOaHk.468e4b18caba31a6c408c40e553d1e6eaa2e174ec071f8110f90bad1681199b9', 
            baseId: 'app5v5h03V9wMF6Xh',
            tableName: 'Table 1'
        };
    </script>

    <div id="loading">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-orange-500 mb-4"></div>
        <p id="loadingText" class="font-bold text-orange-500">Wysyłanie...</p>
    </div>

    <header class="p-6 pb-4 flex justify-between items-end bg-slate-900 sticky top-0 z-50 border-b border-slate-800">
        <div>
            <h1 class="text-3xl font-black text-orange-500 tracking-tighter uppercase">Co Jemy?</h1>
            <p id="stats" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Inicjalizacja...</p>
        </div>
        <button onclick="document.getElementById('fileInput').click()" class="bg-orange-600 w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-transform">
            <span class="text-4xl font-light text-white">+</span>
        </button>
    </header>

    <input type="file" id="fileInput" accept="image/*" capture="environment" class="hidden" onchange="handleFileSelect(event)">
    
    <div id="grid" class="grid-container"></div>

    <div id="addModal" class="custom-modal">
        <div class="bg-slate-800 p-6 rounded-3xl w-full max-w-sm border border-white/10 shadow-2xl">
            <h2 class="text-xl font-bold text-orange-500 mb-4">Nowe danie</h2>
            <div id="previewContainer" class="mb-4 rounded-xl overflow-hidden aspect-video bg-black">
                <img id="addPreview" class="w-full h-full object-cover">
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Nazwa dania *</label>
                    <input type="text" id="newName" class="input-field" placeholder="np. Pyszna Pasta">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Opis (opcjonalnie)</label>
                    <textarea id="newDesc" class="input-field h-20 resize-none" placeholder="Co tam było dobrego?"></textarea>
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="closeAddModal()" class="flex-1 py-3 font-bold text-slate-400">Anuluj</button>
                    <button onclick="submitNewDish()" class="flex-[2] bg-orange-600 py-3 rounded-xl font-bold shadow-lg active:scale-95 transition-transform">Zapisz danie</button>
                </div>
            </div>
        </div>
    </div>

    <div id="viewModal" class="custom-modal" onclick="this.style.display='none'">
        <div class="flex flex-col items-center w-full max-w-sm p-4" onclick="event.stopPropagation()">
            <img id="viewImg" class="w-full rounded-3xl shadow-2xl mb-6 border border-white/10">
            <h2 id="viewTitle" class="text-3xl font-bold text-white mb-2 text-center tracking-tight"></h2>
            <p id="viewDesc" class="text-slate-400 italic text-center text-lg px-4"></p>
            <button id="delBtn" class="mt-12 text-red-500 font-bold py-3 px-8 rounded-full border border-red-500/20 text-xs tracking-widest uppercase">Usuń danie</button>
        </div>
    </div>

    <script>
        let currentFileData = null;

        async function fetchDishes() {
            document.getElementById('stats').innerText = "Pobieranie...";
            try {
                const response = await fetch(`https://api.airtable.com/v0/${CONFIG.baseId}/${encodeURIComponent(CONFIG.tableName)}`, {
                    headers: { Authorization: `Bearer ${CONFIG.apiKey}` }
                });
                const data = await response.json();
                if (data.records) render(data.records);
            } catch (e) { alert("Błąd połączenia!"); }
        }

        function render(records) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            document.getElementById('stats').innerText = `Liczba dań w chmurze: ${records.length}`;
            
            // Sortowanie po dacie utworzenia (od najnowszych)
            records.sort((a, b) => new Date(b.createdTime) - new Date(a.createdTime));

            records.forEach(record => {
                const f = record.fields;
                if (!f.Photo) return;
                const card = document.createElement('div');
                card.className = 'dish-card active:scale-95 transition-transform';
                card.innerHTML = `<img src="${f.Photo}" class="dish-image" loading="lazy"><div class="absolute bottom-0 p-3 w-full bg-gradient-to-t from-black text-xs font-bold truncate">${f.Name || ''}</div>`;
                card.onclick = () => {
                    document.getElementById('viewImg').src = f.Photo;
                    document.getElementById('viewTitle').innerText = f.Name || '';
                    document.getElementById('viewDesc').innerText = f.Description || '';
                    document.getElementById('delBtn').onclick = () => deleteDish(record.id);
                    document.getElementById('viewModal').style.display = 'flex';
                };
                grid.appendChild(card);
            });
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 550;
                    let w = img.width, h = img.height;
                    if (w > h) { if(w > max){ h *= max/w; w = max; } }
                    else { if(h > max){ w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    
                    currentFileData = canvas.toDataURL('image/jpeg', 0.5);
                    document.getElementById('addPreview').src = currentFileData;
                    document.getElementById('newName').classList.remove('input-error');
                    document.getElementById('newName').value = "";
                    document.getElementById('newDesc').value = "";
                    document.getElementById('addModal').style.display = 'flex';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function closeAddModal() {
            document.getElementById('addModal').style.display = 'none';
            currentFileData = null;
        }

        async function submitNewDish() {
            const nameInput = document.getElementById('newName');
            const name = nameInput.value.trim();
            const desc = document.getElementById('newDesc').value.trim();

            if (!name) {
                nameInput.classList.add('input-error');
                nameInput.focus();
                // Opcjonalne wibracje na telefonie
                if (navigator.vibrate) navigator.vibrate(50);
                return;
            }

            document.getElementById('addModal').style.display = 'none';
            const loading = document.getElementById('loading');
            loading.style.display = 'flex';

            try {
                const res = await fetch(`https://api.airtable.com/v0/${CONFIG.baseId}/${encodeURIComponent(CONFIG.tableName)}`, {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${CONFIG.apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fields: { Name: name, Description: desc, Photo: currentFileData } })
                });
                if (res.ok) fetchDishes();
                else alert("Błąd wysyłania!");
            } catch (err) { alert("Błąd sieci!"); }
            finally { 
                loading.style.display = 'none'; 
                currentFileData = null;
                document.getElementById('fileInput').value = '';
            }
        }

        async function deleteDish(id) {
            if (!confirm("Usunąć to danie na stałe?")) return;
            document.getElementById('viewModal').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';
            await fetch(`https://api.airtable.com/v0/${CONFIG.baseId}/${encodeURIComponent(CONFIG.tableName)}/${id}`, {
                method: 'DELETE', headers: { Authorization: `Bearer ${CONFIG.apiKey}` }
            });
            fetchDishes();
            document.getElementById('loading').style.display = 'none';
        }

        fetchDishes();
    </script>
</body>
</html>
