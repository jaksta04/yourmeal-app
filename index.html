<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Co Jemy? V7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; font-family: sans-serif; overflow-x: hidden; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
        .dish-card { background: #1e293b; border-radius: 24px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .dish-image { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        
        /* Styl Switchy */
        .filter-switch { padding: 10px 12px; border-radius: 16px; font-size: 11px; font-weight: 800; border: 2px solid #334155; transition: all 0.2s; text-transform: uppercase; color: #64748b; background: transparent; }
        .filter-switch.active { border-color: #ea580c; color: #ea580c; background: rgba(234, 88, 12, 0.05); }
        
        .dice-btn { background: #1e293b; width: 48px; height: 48px; border-radius: 16px; border: 2px solid #334155; display: flex; items-center; justify-content: center; font-size: 20px; transition: all 0.2s; }
        .dice-btn:active { transform: scale(0.9); border-color: #ea580c; }

        .input-field { background: #0f172a; border: 2px solid #334155; border-radius: 14px; padding: 12px; width: 100%; color: white; outline: none; }
        .input-error { border-color: #ef4444 !important; }
        #loading { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 200; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .custom-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 150; display: none; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <script>
        const CONFIG = {
            apiKey: 'patgjxDFQDP1rOaHk.468e4b18caba31a6c408c40e553d1e6eaa2e174ec071f8110f90bad1681199b9', 
            baseId: 'app5v5h03V9wMF6Xh',
            tableName: 'Table 1'
        };
    </script>

    <div id="loading">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-orange-500 mb-4"></div>
        <p class="text-xs font-bold text-orange-500 uppercase tracking-widest">Synchronizacja...</p>
    </div>

    <header class="p-6 pb-2 bg-slate-900 sticky top-0 z-50">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-black text-orange-500 tracking-tighter">CO JEMY?</h1>
                <p id="stats" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Ładowanie...</p>
            </div>
            <button onclick="document.getElementById('fileInput').click()" class="bg-orange-600 w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                <span class="text-4xl text-white font-light">+</span>
            </button>
        </div>

        <div class="flex items-center gap-2 mb-4">
            <div class="grid grid-cols-3 gap-2 flex-1">
                <button onclick="toggleFilter('Szybkie')" id="sw-Szybkie" class="filter-switch">Szybkie</button>
                <button onclick="toggleFilter('Obiad')" id="sw-Obiad" class="filter-switch">Obiad</button>
                <button onclick="toggleFilter('Gotowiec')" id="sw-Gotowiec" class="filter-switch">Gotowiec</button>
            </div>
            <button onclick="rollDice()" class="dice-btn">?</button>
        </div>
    </header>

    <input type="file" id="fileInput" accept="image/*" capture="environment" class="hidden" onchange="handleFileSelect(event)">
    <div id="grid" class="grid-container"></div>

    <div id="addModal" class="custom-modal">
        <div class="bg-slate-800 p-6 rounded-[32px] w-full max-w-sm border border-white/10 shadow-2xl">
            <h2 class="text-xl font-black text-white mb-4 uppercase">Nowe danie</h2>
            <img id="addPreview" class="w-full aspect-square object-cover rounded-2xl mb-5 bg-black">
            <div class="space-y-4">
                <input type="text" id="newName" class="input-field" placeholder="Nazwa dania *">
                <select id="newTag" class="input-field">
                    <option value="Szybkie">Szybkie</option>
                    <option value="Obiad" selected>Obiad</option>
                    <option value="Gotowiec">Gotowiec</option>
                </select>
                <textarea id="newIngredients" class="input-field h-24 resize-none" placeholder="Co kupić?"></textarea>
                <div class="flex gap-4">
                    <button onclick="closeAddModal()" class="flex-1 py-4 text-slate-500 font-bold uppercase text-xs">Anuluj</button>
                    <button onclick="submitNewDish()" class="flex-[2] bg-orange-600 py-4 rounded-2xl font-black text-white text-xs uppercase tracking-widest">Zapisz</button>
                </div>
            </div>
        </div>
    </div>

    <div id="viewModal" class="custom-modal">
        <div class="flex flex-col items-center w-full max-w-sm relative">
            <button onclick="closeViewModal()" class="absolute -top-12 right-0 text-white text-4xl font-light">&times;</button>
            
            <img id="viewImg" class="w-full rounded-[40px] shadow-2xl mb-6 aspect-square object-cover border border-white/10">
            <div class="px-2 text-center w-full">
                <span id="viewTag" class="bg-orange-500/10 text-orange-500 text-[10px] font-black px-3 py-1 rounded-full uppercase mb-2 inline-block"></span>
                <h2 id="viewTitle" class="text-3xl font-black text-white mb-4 leading-tight"></h2>
                
                <div id="viewIngBox" class="bg-slate-900/80 p-5 rounded-[24px] border border-white/5 hidden text-left mb-6">
                    <p id="viewIngredients" class="text-slate-200 text-sm leading-relaxed"></p>
                </div>
            </div>

            <div class="flex flex-col gap-4 w-full px-4">
                <button onclick="rollDice()" class="bg-white/5 border border-white/10 py-4 rounded-2xl font-bold text-sm uppercase tracking-widest">Losuj dalej</button>
                <button id="delBtn" class="text-red-500/30 text-[9px] font-bold uppercase tracking-[0.3em]">Usuń to danie</button>
            </div>
        </div>
    </div>

    <script>
        let allRecords = [];
        let activeFilters = new Set();
        let currentFileData = null;

        async function fetchDishes() {
            document.getElementById('loading').style.display = 'flex';
            try {
                const response = await fetch(`https://api.airtable.com/v0/${CONFIG.baseId}/${encodeURIComponent(CONFIG.tableName)}`, {
                    headers: { Authorization: `Bearer ${CONFIG.apiKey}` }
                });
                const data = await response.json();
                allRecords = data.records || [];
                render();
            } catch (e) { alert("Błąd bazy!"); }
            finally { document.getElementById('loading').style.display = 'none'; }
        }

        function toggleFilter(tag) {
            const btn = document.getElementById('sw-' + tag);
            if (activeFilters.has(tag)) {
                activeFilters.delete(tag);
                btn.classList.remove('active');
            } else {
                activeFilters.add(tag);
                btn.classList.add('active');
            }
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            const filtered = activeFilters.size === 0 
                ? allRecords 
                : allRecords.filter(r => activeFilters.has(r.fields.Tags));

            document.getElementById('stats').innerText = `Liczba dań w chmurze: ${filtered.length}`;

            filtered.sort((a, b) => new Date(b.createdTime) - new Date(a.createdTime)).forEach(record => {
                const f = record.fields;
                if (!f.Photo) return;
                const card = document.createElement('div');
                card.className = 'dish-card active:scale-95 transition-all';
                card.innerHTML = `
                    <img src="${f.Photo}" class="dish-image">
                    <div class="absolute bottom-0 p-3 w-full bg-gradient-to-t from-black/90 to-transparent">
                        <div class="text-[10px] font-bold uppercase truncate">${f.Name || ''}</div>
                    </div>
                `;
                card.onclick = () => showDetails(record);
                grid.appendChild(card);
            });
        }

        function rollDice() {
            const filtered = activeFilters.size === 0 
                ? allRecords 
                : allRecords.filter(r => activeFilters.has(r.fields.Tags));
            
            if (filtered.length === 0) return alert("Brak dań!");
            const random = filtered[Math.floor(Math.random() * filtered.length)];
            showDetails(random);
        }

        function showDetails(record) {
            const f = record.fields;
            document.getElementById('viewImg').src = f.Photo;
            document.getElementById('viewTitle').innerText = f.Name;
            document.getElementById('viewTag').innerText = f.Tags || "";
            
            const ingBox = document.getElementById('viewIngBox');
            if (f.Ingredients) {
                ingBox.classList.remove('hidden');
                document.getElementById('viewIngredients').innerText = f.Ingredients;
            } else {
                ingBox.classList.add('hidden');
            }
            
            document.getElementById('delBtn').onclick = () => deleteDish(record.id);
            document.getElementById('viewModal').style.display = 'flex';
        }

        function closeViewModal() { document.getElementById('viewModal').style.display = 'none'; }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 500;
                    let w = img.width, h = img.height;
                    if (w > h) { if(w > max){ h *= max/w; w = max; } }
                    else { if(h > max){ w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    currentFileData = canvas.toDataURL('image/jpeg', 0.5);
                    document.getElementById('addPreview').src = currentFileData;
                    document.getElementById('newName').classList.remove('input-error');
                    document.getElementById('newName').value = "";
                    document.getElementById('newIngredients').value = "";
                    document.getElementById('addModal').style.display = 'flex';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function submitNewDish() {
            const nameInput = document.getElementById('newName');
            const name = nameInput.value.trim();
            if (!name) { nameInput.classList.add('input-error'); return; }

            document.getElementById('addModal').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';

            await fetch(`https://api.airtable.com/v0/${CONFIG.baseId}/${encodeURIComponent(CONFIG.tableName)}`, {
                method: 'POST',
                headers: { Authorization: `Bearer ${CONFIG.apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ fields: { 
                    Name: name, 
                    Tags: document.getElementById('newTag').value, 
                    Photo: currentFileData, 
                    Ingredients: document.getElementById('newIngredients').value.trim() 
                } })
            });
            fetchDishes();
        }

        async function deleteDish(id) {
            if (!confirm("Na pewno?")) return;
            document.getElementById('viewModal').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';
            await fetch(`https://api.airtable.com/v0/${CONFIG.baseId}/${encodeURIComponent(CONFIG.tableName)}/${id}`, {
                method: 'DELETE', headers: { Authorization: `Bearer ${CONFIG.apiKey}` }
            });
            fetchDishes();
        }

        function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }

        fetchDishes();
    </script>
</body>
</html>
