<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Moje Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
        .dish-card { background: #1e293b; border-radius: 16px; overflow: hidden; position: relative; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
        .dish-image { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .dish-info { padding: 8px; background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%); position: absolute; bottom: 0; width: 100%; }
        #loading { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="loading">Przetwarzam pyszności...</div>

    <header class="p-6 flex justify-between items-center bg-slate-900 sticky top-0 z-50 border-b border-slate-800">
        <div>
            <h1 class="text-2xl font-black text-orange-500 tracking-tight">MOJE MENU</h1>
            <p class="text-xs text-slate-400">Co dziś jemy?</p>
        </div>
        <button onclick="document.getElementById('fileInput').click()" class="bg-orange-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-transform">
            <span class="text-3xl font-light">+</span>
        </button>
    </header>

    <input type="file" id="fileInput" accept="image/*" capture="environment" class="hidden" onchange="processAndAdd(event)">

    <div id="grid" class="grid-container">
        </div>

    <div id="modal" class="fixed inset-0 bg-black/90 z-[100] hidden p-6 flex flex-col justify-center items-center" onclick="this.classList.add('hidden')">
        <img id="modalImg" class="w-full rounded-2xl mb-4">
        <h2 id="modalTitle" class="text-2xl font-bold text-orange-500"></h2>
        <p id="modalDesc" class="mt-2 text-center text-slate-300 italic"></p>
        <button onclick="deleteCurrent()" class="mt-8 text-red-500 text-sm border border-red-500/30 px-4 py-2 rounded-full">Usuń to danie</button>
    </div>

    <script>
        let db;
        let currentId = null;
        const request = indexedDB.open("FoodAppDB", 1);

        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("dishes", { keyPath: "id", autoIncrement: true });
        };

        request.onsuccess = e => { db = e.target.result; render(); };

        async function processAndAdd(event) {
            const file = event.target.files[0];
            if (!file) return;

            const name = prompt("Jak nazywa się to danie?");
            if (!name) return;
            const desc = prompt("Dodatkowy opis (opcjonalnie):") || "";

            document.getElementById('loading').style.display = 'block';

            const reader = new FileReader();
            reader.onload = async (e) => {
                const img = new Image();
                img.onload = () => {
                    // Kompresja do Max 800px dla oszczędności miejsca
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const max = 800;
                    if (w > h) { if(w > max){ h *= max/w; w = max; } }
                    else { if(h > max){ w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    
                    const compressed = canvas.toDataURL('image/jpeg', 0.7);
                    
                    const tx = db.transaction("dishes", "readwrite");
                    tx.objectStore("dishes").add({ name, desc, image: compressed });
                    tx.oncomplete = () => {
                        document.getElementById('loading').style.display = 'none';
                        render();
                    };
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            db.transaction("dishes", "readonly").objectStore("dishes").getAll().onsuccess = e => {
                e.target.result.forEach(dish => {
                    const card = document.createElement('div');
                    card.className = 'dish-card active:scale-95 transition-transform';
                    card.onclick = () => showDetails(dish);
                    card.innerHTML = `
                        <img src="${dish.image}" class="dish-image">
                        <div class="dish-info">
                            <div class="text-sm font-bold truncate">${dish.name}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            };
        }

        function showDetails(dish) {
            currentId = dish.id;
            document.getElementById('modalImg').src = dish.image;
            document.getElementById('modalTitle').innerText = dish.name;
            document.getElementById('modalDesc').innerText = dish.desc;
            document.getElementById('modal').classList.remove('hidden');
        }

        function deleteCurrent() {
            if (confirm("Na pewno usunąć?")) {
                db.transaction("dishes", "readwrite").objectStore("dishes").delete(currentId).oncomplete = render;
            }
        }
    </script>
</body>
</html>
