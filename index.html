<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Co Jemy? V9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; font-family: sans-serif; overflow-x: hidden; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
        .dish-card { background: #1e293b; border-radius: 24px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .dish-image { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        
        /* Filtry na górze - dopasowane wysokości */
        .filter-switch { height: 40px; border-radius: 12px; font-size: 10px; font-weight: 800; border: 2px solid #334155; transition: all 0.2s; text-transform: uppercase; color: #64748b; background: transparent; flex: 1; }
        .filter-switch.active { border-color: #ea580c; color: #ea580c; background: rgba(234, 88, 12, 0.05); }
        
        /* Przycisk losowania - Dopasowany rozmiar */
        .dice-btn { background: #ea580c; width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 18px; transition: all 0.2s; flex-shrink: 0; }
        .dice-btn:active { transform: scale(0.9); }

        /* Formularz dodawania */
        .input-field { background: #0f172a; border: 2px solid #334155; border-radius: 14px; padding: 12px; width: 100%; color: white; outline: none; }
        .input-error { border-color: #ef4444 !important; background: #450a0a !important; }
        label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; margin-left: 4px; margin-bottom: 4px; display: block; }
        
        .tag-box { padding: 10px; border-radius: 12px; border: 2px solid #334155; font-size: 11px; font-weight: 700; text-align: center; color: #64748b; transition: all 0.2s; }
        .tag-box.selected { border-color: #ea580c; color: white; background: #ea580c; }

        #loading { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 200; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .custom-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 150; display: none; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <script>
        const CONFIG = {
            apiKey: 'patgjxDFQDP1rOaHk.468e4b18caba31a6c408c40e553d1e6eaa2e174ec071f8110f90bad1681199b9', 
            baseId: 'app5v5h03V9wMF6Xh',
            tableName: 'Table 1'
        };
    </script>

    <div id="loading">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-orange-500 mb-4"></div>
        <p class="text-[10px] font-bold text-orange-500 uppercase">Synchronizacja...</p>
    </div>

    <header class="p-6 pb-2 bg-slate-900 sticky top-0 z-50">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-black text-orange-500 tracking-tighter">CO JEMY?</h1>
                <p id="stats" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Wczytywanie dań...</p>
            </div>
            <button onclick="document.getElementById('fileInput').click()" class="bg-orange-600 w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                <span class="text-4xl text-white font-light">+</span>
            </button>
        </div>

        <div class="flex items-center gap-2 mb-4">
            <div class="flex gap-2 flex-1">
                <button onclick="toggleFilter('Szybkie')" id="sw-Szybkie" class="filter-switch">Szybkie</button>
                <button onclick="toggleFilter('Obiad')" id="sw-Obiad" class="filter-switch">Obiad</button>
                <button onclick="toggleFilter('Gotowiec')" id="sw-Gotowiec" class="filter-switch">Gotowiec</button>
            </div>
            <button onclick="rollDice()" class="dice-btn">?</button>
        </div>
    </header>

    <input type="file" id="fileInput" accept="image/*" capture="environment" class="hidden" onchange="handleFileSelect(event)">
    <div id="grid" class="grid-container"></div>

    <div id="addModal" class="custom-modal">
        <div class="bg-slate-800 p-6 rounded-[32px] w-full max-w-sm border border-white/10 shadow-2xl overflow-y-auto max-h-[90vh]">
            <img id="addPreview" class="w-full aspect-square object-cover rounded-2xl mb-5 bg-black">
            
            <div class="space-y-4 text-left">
                <div class="grid grid-cols-3 gap-2">
                    <div onclick="selectAddTag('Szybkie')" id="at-Szybkie" class="tag-box">Szybkie</div>
                    <div onclick="selectAddTag('Obiad')" id="at-Obiad" class="tag-box selected">Obiad</div>
                    <div onclick="selectAddTag('Gotowiec')" id="at-Gotowiec" class="tag-box">Gotowiec</div>
                </div>

                <div>
                    <label>Nazwa</label>
                    <input type="text" id="newName" class="input-field">
                </div>
                
                <div>
                    <label>Opis</label>
                    <textarea id="newDesc" class="input-field h-24 resize-none"></textarea>
                </div>
                
                <div class="flex gap-4 pt-2">
                    <button onclick="closeAddModal()" class="flex-1 py-4 text-slate-500 font-bold uppercase text-xs">Anuluj</button>
                    <button onclick="submitNewDish()" class="flex-[2] bg-orange-600 py-4 rounded-2xl font-black text-white text-xs uppercase tracking-widest">Zapisz danie</button>
                </div>
            </div>
        </div>
    </div>

    <div id="viewModal" class="custom-modal">
        <div class="flex flex-col items-center w-full max-w-sm relative">
            <button onclick="closeViewModal()" class="absolute -top-12 right-0 text-white text-4xl font-light">&times;</button>
            
            <img id="viewImg" class="w-full rounded-[40px] shadow-2xl mb-6 aspect-square object-cover border border-white/10">
            <div class="px-2 text-center w-full">
                <span id="viewTag" class="bg-orange-500/10 text-orange-500 text-[10px] font-black px-3 py-1 rounded-full uppercase mb-2 inline-block"></span>
                <h2 id="viewTitle" class="text-3xl font-black text-white mb-4 leading-tight"></h2>
                <p id="viewDesc" class="text-slate-400 italic text-center text-lg mb-8"></p>
            </div>

            <div class="flex flex-col gap-4 w-full px-4">
                <button id="rollAgainBtn" onclick="rollDice()" class="bg-white/10 border border-white/10 py-4 rounded-2xl font-bold text-sm uppercase tracking-widest hidden">Losuj dalej</button>
                <button id="delBtn" class="text-red-500/60 text-[10px] font-bold uppercase tracking-[0.3em] py-2">Usuń danie</button>
            </div>
        </div>
    </div>

    <script>
        let allRecords = [];
        let activeFilters = new Set();
        let currentFileData = null;
        let selectedAddTag = 'Obiad';

        async function fetchDishes() {
            document.getElementById('loading').style.display = 'flex';
            try {
                const response = await fetch(`https://api.airtable.com/v0/${CONFIG.baseId}/${encodeURIComponent(CONFIG.tableName)}`, {
                    headers: { Authorization: `Bearer ${CONFIG.apiKey}` }
                });
                const data = await response.json();
                allRecords = data.records || [];
                render();
            } catch (e) { alert("Błąd bazy!"); }
            finally { document.getElementById('loading').style.display = 'none'; }
        }

        function toggleFilter(tag) {
            const btn = document.getElementById('sw-' + tag);
            if (activeFilters.has(tag)) { activeFilters.delete(tag); btn.classList.remove('active'); }
            else { activeFilters.add(tag); btn.classList.add('active'); }
            render();
        }

        function selectAddTag(tag) {
            selectedAddTag = tag;
            document.querySelectorAll('.tag-box').forEach(b => b.classList.remove('selected'));
            document.getElementById('at-' + tag).classList.add('selected');
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const filtered = activeFilters.size === 0 ? allRecords : allRecords.filter(r => activeFilters.has(r.fields.Tags));
            document.getElementById('stats').innerText = `Liczba dań w chmurze: ${filtered.length}`;

            filtered.sort((a, b) => new Date(b.createdTime) - new Date(a.createdTime)).forEach(record => {
                const f = record.fields;
                if (!f.Photo) return;
                const card = document.createElement('div');
                card.className = 'dish-card active:scale-95 transition-all';
                card.innerHTML = `<img src="${f.Photo}" class="dish-image"><div class="absolute bottom-0 p-3 w-full bg-gradient-to-t from-black/90 to-transparent"><div class="text-[10px] font-bold uppercase truncate">${f.Name || ''}</div></div>`;
                card.onclick = () => showDetails(record, false);
                grid.appendChild(card);
            });
        }

        function rollDice() {
            const filtered = activeFilters.size === 0 ? allRecords : allRecords.filter(r => activeFilters.has(r.fields.Tags));
            if (filtered.length === 0) return alert("Brak dań w wybranych kategoriach!");
            showDetails(filtered[Math.floor(Math.random() * filtered.length)], true);
        }

        function showDetails(record, fromDice) {
            const f = record.fields;
            document.getElementById('viewImg').src = f.Photo;
            document.getElementById('viewTitle').innerText = f.Name;
            document.getElementById('viewTag').innerText = f.Tags || "";
            document.getElementById('viewDesc').innerText = f.Description || "";
            document.getElementById('delBtn').onclick = () => deleteDish(record.id);
            
            // Logika przycisku losowania
            const rollBtn = document.getElementById('rollAgainBtn');
            if (fromDice) rollBtn.classList.remove('hidden');
            else rollBtn.classList.add('hidden');

            document.getElementById('viewModal').style.display = 'flex';
        }

        function closeViewModal() { document.getElementById('viewModal').style.display = 'none'; }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 500;
                    let w = img.width, h = img.height;
                    if (w > h) { if(w > max){ h *= max/w; w = max; } }
                    else { if(h > max){ w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    currentFileData = canvas.toDataURL('image/jpeg', 0.5);
                    document.getElementById('addPreview').src = currentFileData;
                    document.getElementById('newName').classList.remove('input-error');
                    document.getElementById('newName').value = "";
                    document.getElementById('newDesc').value = "";
                    selectAddTag('Obiad');
                    document.getElementById('addModal').style.display = 'flex';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function submitNewDish() {
            const nameEl = document.getElementById('newName');
            if (!nameEl.value.trim()) { nameEl.classList.add('input-error'); return; }
            document.getElementById('addModal').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';
            try {
                await fetch(`https://api.airtable.com/v0/${CONFIG.baseId}/${encodeURIComponent(CONFIG.tableName)}`, {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${CONFIG.apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fields: { 
                        Name: nameEl.value.trim(), 
                        Description: document.getElementById('newDesc').value.trim(),
                        Tags: selectedAddTag, 
                        Photo: currentFileData 
                    } })
                });
                fetchDishes();
            } catch (e) { alert("Błąd zapisu!"); }
        }

        async function deleteDish(id) {
            if (!confirm("Na pewno chcesz usunąć to danie?")) return;
            document.getElementById('viewModal').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';
            await fetch(`https://api.airtable.com/v0/${CONFIG.baseId}/${encodeURIComponent(CONFIG.tableName)}/${id}`, {
                method: 'DELETE', headers: { Authorization: `Bearer ${CONFIG.apiKey}` }
            });
            fetchDishes();
        }

        function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }
        fetchDishes();
    </script>
</body>
</html>
